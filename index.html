<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistoria Técnica - Ora Empresas</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0056b3">
    <style>
        /* TEMA ORA EMPRESAS - VERSÃO TECH */
        :root {
            --cor-acento-tech: #0056b3; 
            --cor-brilho-tech: rgba(0, 123, 255, 0.5); 
            --preto-fundo: #000000;
            --preto-texto: #1A1A1A;
            --branco: #FFFFFF;
            --cinza-borda: #E2E8F0;
            --cinza-fundo-card: #F8FAFC;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--preto-fundo);
            padding: 20px 10px;
            margin: 0;
            color: var(--preto-texto);
        }

        .container {
            max-width: 700px;
            background-color: var(--branco);
            margin: 0 auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 86, 179, 0.15);
            border-top: 8px solid var(--cor-acento-tech);
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--cinza-borda);
        }

        .logo {
            max-width: 200px;
            height: auto;
        }

        h1 {
            color: var(--cor-acento-tech);
            font-size: 22px;
            text-transform: uppercase;
            font-weight: 900;
            margin-top: 15px;
            letter-spacing: 1.5px;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.1);
        }

        .card {
            background: var(--cinza-fundo-card);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--cinza-borda);
            border-left: 5px solid var(--cor-acento-tech);
        }

        .card-title {
            color: var(--cor-acento-tech);
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .form-group { margin-bottom: 15px; }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        
        label {
            display: block;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 6px;
            color: #333;
        }

        input[type="text"], input[type="date"], input[type="number"], select, input[type="file"], input[type="url"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-family: inherit;
            background: var(--branco);
        }

        input:focus, select:focus {
            border-color: var(--cor-brilho-tech);
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.4);
        }

        input[type="file"] { padding: 9px; cursor: pointer; }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            background: var(--branco);
            padding: 12px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .checkbox-group:hover {
            border-color: var(--cor-brilho-tech);
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.1);
        }

        .checkbox-group input {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            accent-color: var(--cor-acento-tech);
            margin-top: 2px;
        }

        .checkbox-group label {
            margin-bottom: 0;
            font-weight: normal;
            font-size: 13px;
            cursor: pointer;
            line-height: 1.4;
            color: #444;
        }

        button {
            width: 100%;
            padding: 18px;
            background-color: var(--cor-acento-tech);
            color: var(--branco);
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: background-color 0.3s, box-shadow 0.3s, transform 0.2s;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        button:hover {
            background-color: #007bff; 
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.6);
            transform: scale(1.02);
        }
        
        button.btn-secundario {
            background-color: #444;
            margin: 0;
            padding: 0 15px;
            width: auto;
            font-size: 14px;
            white-space: nowrap;
        }

        button.btn-secundario:hover {
            background-color: #666;
            box-shadow: 0 0 10px rgba(100, 100, 100, 0.3);
        }

        /* Estilos dos botões de ação final */
        .botoes-acao {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        @media (min-width: 600px) {
            .botoes-acao {
                flex-direction: row;
            }
        }
        
        button.btn-acao {
            margin: 0;
            padding: 15px;
            font-size: 15px;
            flex: 1;
        }

        button.btn-imprimir { background-color: var(--preto-fundo); border: 1px solid var(--cor-acento-tech); }
        button.btn-imprimir:hover { background-color: #333; }
        
        button.btn-telegram { background-color: #0088cc; }
        button.btn-telegram:hover { background-color: #0099e6; }
        
        button.btn-editar { background-color: #ff9800; color: #fff;}
        button.btn-editar:hover { background-color: #e68a00; }

        #resultado {
            display: none;
            background: #fdfdfd;
            border: 2px solid var(--cor-acento-tech);
            border-left: 10px solid var(--cor-acento-tech);
        }
        
        .secao-res {
            margin-bottom: 20px;
            padding: 15px;
            background: var(--branco);
            border-radius: 6px;
            border: 1px solid #eee;
        }

        .secao-res h3 {
            color: var(--cor-acento-tech);
            font-size: 16px;
            border-bottom: 2px solid var(--cor-acento-tech);
            padding-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        ul { padding-left: 20px; transition: 0.3s; }
        li {
            margin-bottom: 10px;
            font-size: 14px;
            line-height: 1.5;
            color: #333;
            outline: none;
        }

        .alerta-item { color: #007bff; font-weight: bold; }
        .dica-item { color: #1a1a1a; font-weight: bold; }

        .critico {
            background: var(--cor-acento-tech);
            color: var(--branco);
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.6);
        }

        #div_gamer_opcoes, #div_stands_opcoes {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
        }
        
        .img-anexo {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            border: 2px solid var(--cor-acento-tech);
            margin-top: 15px;
            object-fit: contain;
        }

        @media print {
            body { background-color: white; padding: 0; color: black; }
            .container { box-shadow: none; border: none; max-width: 100%; margin: 0; padding: 0; border-top: none; }
            #formulario_perguntas, button { display: none !important; }
            #resultado { border: none; display: block; border-left: none; }
            .secao-res, .critico, .img-anexo { page-break-inside: avoid; border: none; }
            h2, h3 { page-break-after: avoid; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://via.placeholder.com/200x80/000000/007BFF?text=ORA+EMPRESAS" alt="Ora Empresas" class="logo">
        <h1>Laudo Técnico de Vistoria</h1>
    </div>

    <div id="formulario_perguntas">
        
        <div class="card">
            <h3 class="card-title">0. Dados Gerais</h3>
            <div class="form-row">
                <div class="form-group"><label>Nome do Técnico:</label><input type="text" id="nome_tecnico" placeholder="Ex: Ronaldo"></div>
                <div class="form-group"><label>Cidade / UF:</label><input type="text" id="cidade" placeholder="Ex: Teresina - PI"></div>
            </div>
            
            <div class="form-group"><label>Nome do Evento / Cliente:</label><input type="text" id="nome_evento" placeholder="Ex: Feira Agro 2026"></div>
            
            <div class="form-group">
                <label>📍 Localização Exata (Maps):</label>
                <div style="display: flex; gap: 8px;">
                    <input type="url" id="link_maps" placeholder="Cole o link ou clique em Capturar GPS ->">
                    <button type="button" class="btn-secundario" id="btn_gps" onclick="capturarLocalizacao()">Capturar GPS</button>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group"><label>Data da Vistoria:</label><input type="date" id="data_vistoria"></div>
                <div class="form-group"><label>Data do Evento:</label><input type="date" id="data_evento"></div>
            </div>

            <div class="form-group" style="margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 15px;">
                <label>📷 Anexar Foto ou Planta do Local (Opcional):</label>
                <input type="file" id="imagem_local" accept="image/*">
            </div>
        </div>

        <div class="card">
            <h3 class="card-title">1. Perfil e Criticidade</h3>
            <div class="form-group">
                <select id="tipo_evento" onchange="verificarTipoEvento()">
                    <option value="Palestra/Congresso">Palestra / Congresso / Workshop</option>
                    <option value="Feira de Negócios">Feira de Negócios / Stands</option>
                    <option value="Gamer/E-sports">Gamer / E-sports (Campeonato)</option>
                    <option value="Grande Porte/Massa">Show / Festival / Evento de Massa</option>
                    <option value="Transmissão Crítica">Transmissão Crítica (Live / TV)</option>
                </select>
            </div>

            <div id="div_stands_opcoes">
                <div class="form-group">
                    <label>Quantidade Estimada de Stands:</label>
                    <input type="number" id="qtd_stands" value="0" min="0">
                </div>
            </div>

            <div id="div_gamer_opcoes">
                <div class="form-group">
                    <label>Plataforma da Competição:</label>
                    <select id="plataforma_gamer" onchange="verificarQtdPcs()">
                        <option value="mobiles">Apenas Mobiles (Wi-Fi)</option>
                        <option value="pcs">Apenas PCs/Consoles (Cabo)</option>
                        <option value="ambos">Ambos (PCs e Mobiles)</option>
                    </select>
                </div>
                <div class="form-group" id="div_qtd_pcs" style="display: none;">
                    <label>Qtd. de PCs/Consoles (Cabo):</label>
                    <input type="number" id="qtd_pcs" value="0" min="0">
                </div>
            </div>
        </div>

        <div class="card">
            <h3 class="card-title">2. Estimativa de Carga</h3>
            <div class="form-row">
                <div class="form-group"><label>Público Geral:</label><input type="number" id="publico" value="0" min="0"></div>
                <div class="form-group"><label>Staff/Equipe:</label><input type="number" id="staff" value="0" min="0"></div>
            </div>
            <div class="form-group"><label>Maquininhas de Cartão (POS):</label><input type="number" id="maquininhas" value="0" min="0"></div>
        </div>

        <div class="card">
            <h3 class="card-title">3. Infraestrutura e Barreiras</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Ambiente:</label>
                    <select id="ambiente">
                        <option value="interno">Interno (Indoor)</option>
                        <option value="externo">Externo (Outdoor)</option>
                        <option value="ambos">Ambos (Indoor e Outdoor)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Barreiras:</label>
                    <select id="divisorias">
                        <option value="amplo">Vão Livre</option>
                        <option value="salas">Muitas Salas</option>
                    </select>
                </div>
            </div>
            <div class="checkbox-group"><input type="checkbox" id="metal"><label><b>Obstrução Metálica:</b> Food Trucks, tendas de metal ou palcos.</label></div>
            <div class="checkbox-group"><input type="checkbox" id="fixacao" checked=""><label><b>Fixação Alta:</b> Existe local para APs acima de 2.5m.</label></div>
            <div class="checkbox-group"><input type="checkbox" id="distancia_100m"><label><b>Distância > 100m:</b> Equipamento muito distante do Rack.</label></div>
        </div>

        <div class="card">
            <h3 class="card-title">4. Fatores Críticos</h3>
            <div class="checkbox-group"><input type="checkbox" id="tem_live"><label><b>Transmissão:</b> Haverá Live ou captação por Imprensa.</label></div>
            <div class="checkbox-group"><input type="checkbox" id="sinal_ruim_4g"><label><b>Rede Móvel Ruim:</b> A internet das operadoras falha no local.</label></div>
            <div class="checkbox-group"><input type="checkbox" id="energia_oscila"><label><b>Energia Instável:</b> Quedas ou uso de gerador oscilante.</label></div>
            <div class="checkbox-group"><input type="checkbox" id="tem_hotspot"><label><b>Hotspot:</b> Cliente exige portal de login (Leads).</label></div>
        </div>

        <button onclick="gerarProjeto()">Gerar Laudo Técnico</button>
    </div>

    <div id="resultado" class="card"></div>
</div>

<script>
    function formatarData(dataISO) {
        if (!dataISO) return "Não informada";
        let partes = dataISO.split('-');
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    function lerImagemAsBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
            reader.readAsDataURL(file);
        });
    }

    function capturarLocalizacao() {
        let btn = document.getElementById('btn_gps');
        let inputLink = document.getElementById('link_maps');

        if (!navigator.geolocation) {
            alert("O GPS não é suportado pelo seu navegador.");
            return;
        }

        btn.innerText = "⏳ Buscando...";
        btn.style.backgroundColor = "#ff9800";

        navigator.geolocation.getCurrentPosition(
            (position) => {
                let lat = position.coords.latitude;
                let lon = position.coords.longitude;
                let mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                
                inputLink.value = mapsUrl;
                btn.innerText = "✅ Salvo";
                btn.style.backgroundColor = "#28a745";
            },
            (error) => {
                alert("Erro ao acessar o GPS. Verifique se a localização está ativada no celular.");
                btn.innerText = "Capturar GPS";
                btn.style.backgroundColor = "var(--preto-texto)";
            },
            { enableHighAccuracy: true }
        );
    }

    function verificarTipoEvento() {
        let tipo = document.getElementById('tipo_evento').value;
        let divGamer = document.getElementById('div_gamer_opcoes');
        let divStands = document.getElementById('div_stands_opcoes');
        
        divGamer.style.display = (tipo === 'Gamer/E-sports') ? 'block' : 'none';
        divStands.style.display = (tipo === 'Feira de Negócios') ? 'block' : 'none';
        verificarQtdPcs();
    }

    function verificarQtdPcs() {
        let plat = document.getElementById('plataforma_gamer').value;
        let divPcs = document.getElementById('div_qtd_pcs');
        divPcs.style.display = (plat === 'pcs' || plat === 'ambos') ? 'block' : 'none';
    }

    // NOVA FUNÇÃO: Toggle de Edição
    function toggleEdicao() {
        let btn = document.getElementById('btn_editar_laudo');
        let listas = document.querySelectorAll('#resultado ul');
        
        if (listas.length === 0) return;
        
        let isEditable = listas[0].isContentEditable;

        listas.forEach(ul => {
            ul.contentEditable = !isEditable;
            ul.style.backgroundColor = !isEditable ? '#fffde7' : 'transparent';
            ul.style.padding = !isEditable ? '15px 15px 15px 35px' : '0 0 0 20px';
            ul.style.borderRadius = '5px';
            ul.style.border = !isEditable ? '2px dashed #ff9800' : 'none';
        });

        if (!isEditable) {
            btn.innerHTML = "💾 Salvar Alterações";
            btn.style.backgroundColor = "#28a745";
        } else {
            btn.innerHTML = "✏️ Editar Textos";
            btn.style.backgroundColor = "#ff9800";
        }
    }

    // NOVA FUNÇÃO: Copiar para Telegram
    function copiarParaTelegram() {
        let tec = document.getElementById('nome_tecnico').value || 'Não preenchido';
        let evt = document.getElementById('nome_evento').value || 'Não preenchido';
        let cidade = document.getElementById('cidade').value || 'Não preenchida';
        let locUrl = document.getElementById('link_maps').value || 'Sem link informado';
        
        let dVist = formatarData(document.getElementById('data_vistoria').value);
        let dEvt = formatarData(document.getElementById('data_evento').value);
        let tipo = document.getElementById('tipo_evento').value;

        // Construção do Texto formatado para o Telegram
        let texto = `📋 *LAUDO TÉCNICO - ORA EMPRESAS*\n\n`;
        texto += `🏢 *Cliente/Evento:* ${evt}\n`;
        texto += `🏙 *Cidade:* ${cidade}\n`;
        texto += `📍 *Local:* ${locUrl}\n`;
        texto += `👷‍♂️ *Técnico:* ${tec}\n`;
        texto += `🗓 *Data Vistoria:* ${dVist} | *Evento:* ${dEvt}\n`;
        texto += `🎯 *Perfil:* ${tipo}\n\n`;

        // Pega as listas diretamente do DOM para capturar as edições manuais
        let blocos = document.querySelectorAll('.secao-res');
        
        blocos.forEach(bloco => {
            let titulo = bloco.querySelector('h3');
            if(titulo) {
                texto += `*${titulo.innerText}*\n`;
                let itens = bloco.querySelectorAll('li');
                itens.forEach(li => {
                    texto += `• ${li.innerText}\n`;
                });
                texto += `\n`;
            }
        });

        let critico = document.querySelector('.critico');
        if (critico) {
            texto += `🚨 *${critico.innerText}*\n\n`;
        }

        // Executa a cópia
        navigator.clipboard.writeText(texto).then(() => {
            let btn = document.getElementById('btn_telegram');
            let txtOriginal = btn.innerHTML;
            btn.innerHTML = "✅ Copiado com sucesso!";
            btn.style.backgroundColor = "#28a745";
            setTimeout(() => {
                btn.innerHTML = txtOriginal;
                btn.style.backgroundColor = "#0088cc";
            }, 3000);
        }).catch(err => {
            alert('Erro ao copiar para a área de transferência: ' + err);
        });
    }

    async function gerarProjeto() {
        let tec = document.getElementById('nome_tecnico').value || 'Não preenchido';
        let evt = document.getElementById('nome_evento').value || 'Não preenchido';
        let cidade = document.getElementById('cidade').value || 'Não preenchida';
        let locUrl = document.getElementById('link_maps').value;
        let htmlLocal = locUrl ? `<a href="${locUrl}" target="_blank" style="color: var(--cor-acento-tech); font-weight: bold; text-decoration: none;">📍 Ver no Google Maps</a>` : 'Não informada';
        
        let dVist = formatarData(document.getElementById('data_vistoria').value);
        let dEvt = formatarData(document.getElementById('data_evento').value);

        let fileInput = document.getElementById('imagem_local');
        let imgHTML = '';
        if (fileInput.files && fileInput.files[0]) {
            let imgDataUrl = await lerImagemAsBase64(fileInput.files[0]);
            imgHTML = `<div style="text-align: center;"><img src="${imgDataUrl}" class="img-anexo" alt="Foto do Local"></div>`;
        }

        let tipo = document.getElementById('tipo_evento').value;
        let pub = parseInt(document.getElementById('publico').value) || 0;
        let stf = parseInt(document.getElementById('staff').value) || 0;
        let maq = parseInt(document.getElementById('maquininhas').value) || 0;
        let total = pub + stf + maq;
        
        let qtd_stands = (tipo === 'Feira de Negócios') ? (parseInt(document.getElementById('qtd_stands').value) || 0) : 0;

        let ambiente = document.getElementById('ambiente').value;
        let area_aberta = (ambiente === 'externo' || ambiente === 'ambos');
        let divisorias = document.getElementById('divisorias').value;
        let metal = document.getElementById('metal').checked;
        let fixacao = document.getElementById('fixacao').checked;
        let longa_distancia = document.getElementById('distancia_100m').checked;
        
        let live = document.getElementById('tem_live').checked;
        let sinal_rede_movel = document.getElementById('sinal_ruim_4g').checked;
        let energia = document.getElementById('energia_oscila').checked;
        let hotspot = document.getElementById('tem_hotspot').checked;

        let gamer = (tipo === 'Gamer/E-sports');
        let plat_gamer = document.getElementById('plataforma_gamer').value;
        let qtd_pcs = gamer && (plat_gamer === 'pcs' || plat_gamer === 'ambos') ? (parseInt(document.getElementById('qtd_pcs').value) || 0) : 0;

        let eq = []; let alertas = []; let dicas = [];
        let aps_qtd = 0;

        let precisa_rb = (total > 30 || hotspot || gamer || tipo === "Transmissão Crítica" || tipo === "Grande Porte/Massa" || qtd_stands > 0);
        if (!precisa_rb) {
            eq.push(divisorias === "salas" ? "01x ONU Wi-Fi AX (Roteando) + 01x Roteador Adicional" : "01x ONU Wi-Fi AX (Roteando) ou Roteador Giga");
        } else {
            if (total <= 50 && qtd_stands <= 20) eq.push("01x ONU em Bridge + 01x Mikrotik (RB 750Gr3)");
            else if (total < 150 && qtd_stands <= 50) eq.push("01x ONU em Bridge + 01x Mikrotik (RB 750Gr3 ou 760iGS)");
            else if (total < 300 && qtd_stands <= 80) eq.push("01x ONU em Bridge + 01x Mikrotik (RB 760iGS ou superior)");
            else eq.push("01x ONU em Bridge + 01x Mikrotik Alta Capacidade (RB 4011 ou CCR)");

            let cap = area_aberta ? 100 : 80; 
            if (metal) cap = cap * 0.8; 
            
            aps_qtd = Math.max(1, Math.ceil(total / cap));
            
            if (tipo === 'Feira de Negócios' && qtd_stands > 0) {
                aps_qtd = Math.max(1, Math.ceil(qtd_stands / 8)); 
            }

            if (divisorias === "salas" && aps_qtd < 6) aps_qtd = 6;
            if (tipo === "Grande Porte/Massa" && aps_qtd < 3) aps_qtd = 3;
            if (gamer && plat_gamer === 'pcs' && total <= maq) aps_qtd = 0;

            if (aps_qtd > 0) {
                let modelo_ap = "";
                if (ambiente === 'externo') modelo_ap = "Grandstream GWN7660LR / GWN7664LR (Outdoor)";
                else if (ambiente === 'interno') modelo_ap = "Grandstream GWN7660 / GWN7664 (Indoor)";
                else modelo_ap = "Mix de APs Grandstream (Outdoor e Indoor)";
                
                eq.push(`${aps_qtd}x Access Points ${modelo_ap}`);
                
                if (aps_qtd === 1) eq.push("01x Fonte PoE Gigabit (Injetor)");
                else if (aps_qtd <= 4) eq.push("01x Switch PoE 5 Portas (Para os APs Grandstream)");
                else if (aps_qtd <= 7) eq.push("01x Switch PoE 8 Portas (Para os APs Grandstream)");
                else if (aps_qtd <= 15) eq.push("01x Switch PoE 16 Portas (Para os APs Grandstream)");
                else eq.push("01x Switch PoE 24 Portas (Para os APs Grandstream)");

                alertas.push("REGRA DE OURO: O Wi-Fi nativo da ONU DEVE ESTAR DESABILITADO. Toda a rede sem fio será emitida pelos APs Grandstream.");

                if (aps_qtd > 2) {
                    alertas.push("MAPA DE CALOR NECESSÁRIO: Eventos que exigem mais de 2 APs necessitam da elaboração de um mapa de calor e análise de canais para garantir Roaming.");
                }
            }
        }

        if (qtd_pcs > 0) {
            if (qtd_pcs <= 4) eq.push("01x Switch Gigabit 5 Portas (Rede PCs)");
            else if (qtd_pcs <= 7) eq.push("01x Switch Gigabit 8 Portas (Rede PCs)");
            else if (qtd_pcs <= 15) eq.push("01x Switch Gigabit 16 Portas (Rede PCs)");
            else eq.push("01x Switch Gigabit 24 Portas (Rede PCs)");
        }

        if (aps_qtd > 0 || qtd_pcs > 0) {
            if (ambiente === 'ambos') {
                eq.push("01x Rack Indoor + 01x Caixa Hermética (Para a área externa)");
            } else {
                eq.push(ambiente === 'externo' ? "01x Caixa Hermética / Rack Outdoor (Proteção climática)" : "01x Rack Indoor / Parede");
            }
        }
        
        if (longa_distancia) {
            eq.push("01x Par de Conversores de Mídia (A e B) + Bobina Cabo Drop Óptico");
            alertas.push("O limite de rede metálica é 100m. Utilize conversores e fibra óptica para equipamentos distantes.");
        }
        if (tipo === "Gamer/E-sports" || tipo === "Transmissão Crítica" || tipo === "Grande Porte/Massa") {
            eq.push("01x Kit Antena Starlink (Link de Backup / Failover)");
            alertas.push("EVENTO CRÍTICO: Configure a Starlink na porta WAN2 da Mikrotik com Failover.");
        }
        if (total > 50 || live || energia || gamer || tipo === "Transmissão Crítica" || qtd_stands > 20) {
            eq.push("01x Nobreak Senoidal (Acondicionamento obrigatório de energia)");
        }

        if (total > 250) alertas.push("ESTOURO DE DHCP: A quantidade de usuários excede uma rede /24. Na Mikrotik, altere o Pool e a máscara para /23 ou /22.");
        if (metal && aps_qtd > 0) alertas.push("OBSTRUÇÃO METÁLICA: O sinal sofre reflexão no metal. Evite instalar os APs muito colados às estruturas.");
        if (!fixacao && aps_qtd > 0) alertas.push("ABSORÇÃO DE SINAL: Sem fixação alta, utilize pedestais/tripés para os APs (Mínimo 2.5m).");
        if (live) alertas.push("LIVE DETECTADA: É proibido rodar a Live via Wi-Fi. Puxe um cabo de rede direto para a máquina de transmissão.");
        if (sinal_rede_movel && aps_qtd > 0) dicas.push("A rede móvel ruim sobrecarregará o Wi-Fi. Crie regras no Queue limitando a banda (Ex: 5 Mega/usuário).");
        
        if (hotspot && maq > 0) dicas.push("Crie uma rede (SSID) separada e SEM hotspot, dedicada exclusivamente para as maquininhas de cartão.");
        if (tipo === "Feira de Negócios") dicas.push("Poluição de RF alta. Fixe os canais dos APs Grandstream apenas em 5GHz e evite canalização automática.");
        if (gamer && qtd_pcs > 0) dicas.push("Crie uma VLAN exclusiva para a porta do Switch Gamer, separando totalmente o tráfego dos PCs do Wi-Fi do público.");

        let txt_ambiente = ambiente === 'externo' ? 'Área Externa (Outdoor)' : (ambiente === 'interno' ? 'Área Interna (Indoor)' : 'Misto (Indoor + Outdoor)');
        let txt_divisorias = divisorias === 'salas' ? 'Com Divisórias/Salas' : 'Vão Livre';
        let inf_stands = qtd_stands > 0 ? `   |   <b>Stands:</b> ${qtd_stands}` : '';

        let resDiv = document.getElementById('resultado');
        resDiv.innerHTML = `
            <h2 style="color: var(--cor-acento-tech); font-size: 20px; text-transform: uppercase; margin-top: 0; border-bottom: 2px solid var(--cor-acento-tech); padding-bottom: 10px;">📋 Laudo Técnico de Vistoria</h2>
            
            <div class="secao-res" style="background: var(--cinza-fundo-card); border: 1px solid #eee; padding: 15px; border-radius: 6px; border-left: 5px solid var(--cor-acento-tech);">
                <p style="margin: 0 0 8px 0;"><b>Cliente / Evento:</b> ${evt}   |   <b>Cidade:</b> ${cidade}</p>
                <p style="margin: 0 0 8px 0;"><b>Localização GPS:</b> ${htmlLocal}</p>
                <p style="margin: 0 0 8px 0;"><b>Técnico Responsável:</b> ${tec}</p>
                <p style="margin: 0 0 8px 0;"><b>Data da Vistoria:</b> ${dVist}   |   <b>Data do Evento:</b> ${dEvt}</p>
                <hr style="border: 0; border-top: 1px dashed #ccc; margin: 12px 0;">
                <p style="margin: 0 0 8px 0;"><b>Tipo de Evento:</b> ${tipo}${inf_stands}</p>
                <p style="margin: 0 0 8px 0;"><b>Conexões Estimadas:</b> ${total} dispositivos</p>
                <p style="margin: 0;"><b>Ambiente Físico:</b> ${txt_ambiente} - ${txt_divisorias}</p>
            </div>

            ${imgHTML}

            ${((tipo === "Grande Porte/Massa" || total > 400 || aps_qtd >= 10) ? '<div class="critico" style="margin-top: 20px;">⚠️ PROJETO ALTA DENSIDADE / EXIGE SITE SURVEY DO ENGENHEIRO</div>' : '')}
            
            <div class="secao-res" style="margin-top: 20px;"><h3>📦 Lista de Hardware Exigida</h3><ul>
            ${eq.map(i => `<li><b>${i.substring(0, i.indexOf(' ') > 0 ? i.indexOf(' ') : i.length)}</b> ${i.substring(i.indexOf(' ') + 1)}</li>`).join('')}
            </ul></div>
            
            ${alertas.length ? `<div class="secao-res"><h3>🚨 Alertas Críticos de Engenharia</h3><ul>
            ${alertas.map(i => `<li class="alerta-item">⚠️ ${i}</li>`).join('')}
            </ul></div>` : ''}
            
            ${dicas.length ? `<div class="secao-res"><h3>💡 Recomendações de Configuração</h3><ul>
            ${dicas.map(i => `<li class="dica-item">✔ ${i}</li>`).join('')}
            </ul></div>` : ''}

            <div class="botoes-acao">
                <button class="btn-acao btn-editar" id="btn_editar_laudo" onclick="toggleEdicao()">✏️ Editar Textos</button>
                <button class="btn-acao btn-telegram" id="btn_telegram" onclick="copiarParaTelegram()">✈️ Copiar p/ Telegram</button>
                <button class="btn-acao btn-imprimir" onclick="window.print()">🖨️ Imprimir PDF</button>
            </div>
        `;
            
        resDiv.style.display = 'block';
        resDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
</script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
            .then((reg) => console.log('Service Worker registrado com sucesso!', reg))
            .catch((err) => console.log('Erro ao registrar Service Worker:', err));
    }
</script>

</body>
</html>
