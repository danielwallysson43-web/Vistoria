<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laudo Técnico de Engenharia - Daniel Tec</title>
    <meta name="theme-color" content="#0056b3">
    <style>
        :root {
            --cor-acento-tech: #0056b3; 
            --cor-brilho-tech: rgba(0, 123, 255, 0.5); 
            --preto-fundo: #000000;
            --preto-texto: #1A1A1A;
            --branco: #FFFFFF;
            --cinza-borda: #E2E8F0;
            --cinza-fundo-card: #F8FAFC;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--preto-fundo); padding: 20px 10px; margin: 0; color: var(--preto-texto); }
        .container { max-width: 850px; background-color: var(--branco); margin: 0 auto; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 86, 179, 0.15); border-top: 8px solid var(--cor-acento-tech); }
        .header { text-align: center; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 2px solid var(--cinza-borda); }
        h1 { color: var(--cor-acento-tech); font-size: 22px; text-transform: uppercase; font-weight: 900; margin-top: 15px; letter-spacing: 1.5px; }
        
        .card { background: var(--cinza-fundo-card); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--cinza-borda); border-left: 5px solid var(--cor-acento-tech); transition: 0.3s; }
        .card-title { color: var(--cor-acento-tech); font-size: 16px; margin-top: 0; margin-bottom: 15px; text-transform: uppercase; font-weight: bold; }
        
        .form-group { margin-bottom: 15px; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .form-row .form-group { flex: 1; min-width: 200px; }
        
        label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 6px; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #CBD5E1; border-radius: 6px; font-size: 14px; box-sizing: border-box; outline: none; transition: 0.3s; background: var(--branco); font-family: inherit; }
        textarea { resize: vertical; min-height: 80px; }
        input:focus, select:focus, textarea:focus { border-color: var(--cor-brilho-tech); box-shadow: 0 0 10px rgba(0, 123, 255, 0.4); }
        
        .seletor-master { background: #eef2f7; border-left-color: #333; }
        .seletor-master select { font-weight: bold; color: var(--cor-acento-tech); font-size: 16px; }

        button { width: 100%; padding: 18px; background-color: var(--cor-acento-tech); color: var(--branco); border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #007bff; box-shadow: 0 0 15px rgba(0, 123, 255, 0.6); transform: scale(1.02); }
        
        .modulo { display: none; }
        .modulo.ativo { display: block; animation: fadeIn 0.5s; }
        
        /* Estilos do Laudo Final */
        #resultado { display: none; margin-top: 30px; border: 2px solid var(--cor-acento-tech); padding: 20px; border-radius: 8px; }
        .badge-alerta { background: #fee2e2; color: #991b1b; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .badge-ok { background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; max-width: 100%; margin: 0; border-top: none; }
            .seletor-master, #btn_gerar, .header h1, #formulario_principal { display: none !important; }
            #resultado { display: block !important; border: none; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Sistema de Engenharia de Redes</h1>
    </div>

    <div id="formulario_principal">
        <div class="card seletor-master">
            <div class="form-group">
                <label>TIPO DE VISTORIA / PROJETO:</label>
                <select id="tipo_vistoria" onchange="alternarModulo()">
                    <option value="" disabled selected>Selecione o fluxo...</option>
                    <option value="evento">1. Vistoria Temporária (Eventos)</option>
                    <option value="corporativo">2. Ativação Corporativa (Padrão)</option>
                    <option value="rede_interna">3. Levantamento de Rede Interna (Análise Crítica)</option>
                </select>
            </div>
        </div>

        <div class="card" id="dados_gerais" style="display: none;">
            <h3 class="card-title">0. Identificação</h3>
            <div class="form-row">
                <div class="form-group"><label>Cliente:</label><input type="text" id="nome_cliente" placeholder="Ex: Shopping da Praça"></div>
                <div class="form-group"><label>Técnico:</label><input type="text" id="nome_tecnico" placeholder="Seu nome"></div>
            </div>
        </div>

        <div id="modulo_evento" class="modulo">
            <div class="card">
                <h3 class="card-title">1. Carga de Dispositivos</h3>
                <div class="form-row">
                    <div class="form-group"><label>Usuários Wi-Fi:</label><input type="number" id="evt_wifi" value="0"></div>
                    <div class="form-group"><label>Equip. Cabeados:</label><input type="number" id="evt_cabo" value="0"></div>
                </div>
            </div>
        </div>

        <div id="modulo_corporativo" class="modulo">
            <div class="card">
                <h3 class="card-title">1. Infraestrutura Corporativa</h3>
                <div class="form-row">
                    <div class="form-group"><label>Qtd. Pontos de Rede:</label><input type="number" id="corp_pontos" value="0"></div>
                    <div class="form-group"><label>Qtd. Pessoas:</label><input type="number" id="corp_pessoas" value="0"></div>
                </div>
            </div>
        </div>

        <div id="modulo_rede_interna" class="modulo">
            <div class="card" style="border-left-color: #eab308;">
                <h3 class="card-title">1. Levantamento de Hardware Atual</h3>
                <p style="font-size: 12px; color: #666; margin-bottom: 10px;">Dica: Se encontrar equipamentos <b>Fast</b> ou <b>Caseiros</b>, mencione abaixo.</p>
                
                <div class="form-group">
                    <label>Roteador de Borda / Firewall:</label>
                    <textarea id="ri_borda" placeholder="Ex: TP-Link WR840N (Fast) ou Mikrotik RB750gr3 (Giga)"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Switches de Distribuição:</label>
                    <textarea id="ri_switches" placeholder="Ex: 2x Switch 8p Fast Ethernet Intelbras"></textarea>
                </div>

                <div class="form-group">
                    <label>Access Points (Wi-Fi):</label>
                    <textarea id="ri_wifi" placeholder="Ex: Roteadores D-Link usados como AP"></textarea>
                </div>
            </div>

            <div class="card">
                <h3 class="card-title">2. Topologia e Serviços</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>VLANs Existentes?</label>
                        <select id="ri_vlan">
                            <option value="nao">Não (Rede Plana)</option>
                            <option value="sim">Sim (Segmentada)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Necessita VPN?</label>
                        <select id="ri_vpn">
                            <option value="nao">Não</option>
                            <option value="sim">Sim (Acesso Remoto/Filial)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <button id="btn_gerar" style="display: none;" onclick="gerarLaudoTecnico()">Gerar Laudo e Recomendações</button>
    </div>

    <div id="resultado"></div>
</div>

<script>
    function alternarModulo() {
        let tipo = document.getElementById('tipo_vistoria').value;
        document.querySelectorAll('.modulo').forEach(m => m.classList.remove('ativo'));
        document.getElementById('dados_gerais').style.display = 'block';
        document.getElementById('btn_gerar').style.display = 'block';
        document.getElementById('modulo_' + tipo).classList.add('ativo');
    }

    function gerarLaudoTecnico() {
        const tipo = document.getElementById('tipo_vistoria').value;
        const cliente = document.getElementById('nome_cliente').value || "Não informado";
        const tecnico = document.getElementById('nome_tecnico').value || "Não informado";
        
        let htmlRelatorio = `
            <div style="text-align:center; margin-bottom: 20px;">
                <h2 style="color: var(--cor-acento-tech); margin:0;">RELATÓRIO TÉCNICO DE ENGENHARIA</h2>
                <p><b>Cliente:</b> ${cliente} | <b>Consultor:</b> ${tecnico}</p>
            </div>
            <hr>
        `;

        if (tipo === 'rede_interna') {
            const borda = document.getElementById('ri_borda').value.toLowerCase();
            const switches = document.getElementById('ri_switches').value.toLowerCase();
            const wifi = document.getElementById('ri_wifi').value.toLowerCase();
            
            let recomendacoes = [];
            let removidos = [];

            // Lógica de Análise Automática
            const termosGargalo = ["fast", "10/100", "wr840", "841n", "lit", "caseiro", "domestico", "antigo"];
            
            // Analisando Borda
            if (termosGargalo.some(t => borda.includes(t))) {
                removidos.push("Roteador de Borda atual (Padrão Fast/Doméstico detectado)");
                recomendacoes.push("Instalar Roteador Gigabit com suporte a VPN e Gerência (Sugestão: Mikrotik ou Ubiquiti)");
            }

            // Analisando Switches
            if (termosGargalo.some(t => switches.includes(t))) {
                removidos.push("Switches 10/100 (Fast Ethernet)");
                recomendacoes.push("Substituição por Switches Gigabit PoE (Padrão 802.3at) para alimentar APs e Câmeras");
            }

            // Analisando Wi-Fi
            if (termosGargalo.some(t => wifi.includes(t)) || wifi.includes("roteador")) {
                removidos.push("Roteadores domésticos operando como Access Points");
                recomendacoes.push("Implementar Access Points Profissionais de teto (Wi-Fi 6) com Gerência Centralizada");
            }

            htmlRelatorio += `
                <h3 style="color: #991b1b;">⚠️ ANÁLISE DE GARGALOS (REDE INTERNA)</h3>
                <div style="background: #fff5f5; padding: 15px; border-radius: 5px; border: 1px solid #feb2b2;">
                    <p><b>Equipamentos que DEVEM SER REMOVIDOS:</b></p>
                    <ul style="color: #991b1b;">
                        ${removidos.length > 0 ? removidos.map(r => `<li>${r}</li>`).join('') : "<li>Nenhum gargalo óbvio detectado pelo texto.</li>"}
                    </ul>
                    <p><b>Ações Corretivas Necessárias:</b></p>
                    <ul style="color: #166534;">
                        ${recomendacoes.map(rec => `<li>${rec}</li>`).join('')}
                    </ul>
                </div>
                <div style="margin-top:20px;">
                    <p><b>Inventário Registrado:</b></p>
                    <small>Borda: ${borda} | Switches: ${switches} | Wi-Fi: ${wifi}</small>
                </div>
            `;
        } else {
            htmlRelatorio += `<p>Módulo ${tipo.toUpperCase()} processado com sucesso. (Lógica de cálculo de hardware para eventos ativa).</p>`;
        }

        htmlRelatorio += `<button class="btn-imprimir" onclick="window.print()" style="margin-top:20px; background:#333;">🖨️ Imprimir / Salvar PDF</button>`;

        const resDiv = document.getElementById('resultado');
        resDiv.innerHTML = htmlRelatorio;
        resDiv.style.display = 'block';
        resDiv.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
