<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistoria Técnica Pro - Daniel Tec</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0056b3">
    <style>
        :root {
            --cor-acento-tech: #0056b3; 
            --cor-brilho-tech: rgba(0, 123, 255, 0.5); 
            --preto-fundo: #000000;
            --preto-texto: #1A1A1A;
            --branco: #FFFFFF;
            --cinza-borda: #E2E8F0;
            --cinza-fundo-card: #F8FAFC;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--preto-fundo); padding: 20px 10px; margin: 0; color: var(--preto-texto); }
        .container { max-width: 800px; background-color: var(--branco); margin: 0 auto; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 86, 179, 0.15); border-top: 8px solid var(--cor-acento-tech); }
        .header { text-align: center; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 2px solid var(--cinza-borda); }
        h1 { color: var(--cor-acento-tech); font-size: 22px; text-transform: uppercase; font-weight: 900; margin-top: 15px; letter-spacing: 1.5px; }
        
        .card { background: var(--cinza-fundo-card); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--cinza-borda); border-left: 5px solid var(--cor-acento-tech); }
        .card-title { color: var(--cor-acento-tech); font-size: 16px; margin-top: 0; margin-bottom: 15px; text-transform: uppercase; font-weight: bold; }
        
        .form-group { margin-bottom: 15px; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .form-row .form-group { flex: 1; min-width: 200px; }
        
        label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 6px; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #CBD5E1; border-radius: 6px; font-size: 14px; box-sizing: border-box; outline: none; transition: 0.3s; background: var(--branco); }
        textarea { resize: vertical; min-height: 70px; }
        input:focus, select:focus, textarea:focus { border-color: var(--cor-brilho-tech); box-shadow: 0 0 10px rgba(0, 123, 255, 0.4); }
        
        .checkbox-group { display: flex; align-items: flex-start; background: var(--branco); padding: 12px; border: 1px solid #CBD5E1; border-radius: 6px; margin-bottom: 8px; cursor: pointer; }
        .checkbox-group input { margin-right: 12px; width: 18px; height: 18px; accent-color: var(--cor-acento-tech); }

        .modulo { display: none; }
        .modulo.ativo { display: block; animation: fadeIn 0.5s; }

        button { width: 100%; padding: 18px; background-color: var(--cor-acento-tech); color: var(--branco); border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-gps { background-color: #444; width: auto; padding: 10px 15px; font-size: 12px; margin: 0; }

        #resultado { display: none; margin-top: 30px; border: 2px solid var(--cor-acento-tech); padding: 20px; }
        .alerta-fast { color: #991b1b; background: #fee2e2; padding: 10px; border-radius: 4px; border-left: 5px solid #991b1b; margin-bottom: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        @media print {
            .seletor-master, #formulario_principal, button { display: none !important; }
            #resultado { display: block !important; border: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Laudo Técnico de Engenharia</h1>
    </div>

    <div id="formulario_principal">
        <div class="card" style="background: #eef2f7; border-left-color: #333;">
            <label>ESCOLHA O TIPO DE VISTORIA:</label>
            <select id="tipo_fluxo" onchange="alternarFluxo()">
                <option value="" disabled selected>Selecione...</option>
                <option value="evento">1. Vistoria para Eventos (Temporário)</option>
                <option value="corporativo">2. Ativação Corporativa (Empresas)</option>
                <option value="rede_interna">3. Rede Interna / Retrofit (Análise de Hardware)</option>
            </select>
        </div>

        <div id="secao_identificacao" class="modulo">
            <div class="card">
                <h3 class="card-title">0. Identificação e Localização</h3>
                <div class="form-row">
                    <div class="form-group"><label>Técnico:</label><input type="text" id="nome_tecnico" placeholder="Daniel Lavor"></div>
                    <div class="form-group"><label>Cliente/Evento:</label><input type="text" id="nome_cliente"></div>
                </div>
                <div class="form-group">
                    <label>📍 Localização GPS:</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="link_maps" placeholder="Link do Google Maps">
                        <button type="button" class="btn-gps" onclick="capturarGPS()">Capturar GPS</button>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Data Vistoria:</label><input type="date" id="data_vist"></div>
                    <div class="form-group"><label>Data Execução:</label><input type="date" id="data_exec"></div>
                </div>
                <div class="form-group">
                    <label>📷 Foto do Local/Planta:</label>
                    <input type="file" id="foto_local" accept="image/*">
                </div>
            </div>
        </div>

        <div id="fluxo_padrao" class="modulo">
            <div class="card">
                <h3 class="card-title">1. Estimativa de Carga</h3>
                <div class="form-row">
                    <div class="form-group"><label>Público/Usuários:</label><input type="number" id="qtd_user" value="0"></div>
                    <div class="form-group"><label>Staff/Equipe:</label><input type="number" id="qtd_staff" value="0"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Maquininhas (POS):</label><input type="number" id="qtd_pos" value="0"></div>
                    <div class="form-group"><label>Dispositivos Cabeados:</label><input type="number" id="qtd_cabo" value="0" style="border-color: var(--cor-acento-tech);"></div>
                </div>
            </div>

            <div class="card">
                <h3 class="card-title">2. Infraestrutura e Barreiras</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Ambiente:</label>
                        <select id="ambiente">
                            <option value="interno">Interno (Indoor)</option>
                            <option value="externo">Externo (Outdoor)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Divisórias:</label>
                        <select id="divisorias">
                            <option value="vão livre">Vão Livre</option>
                            <option value="muitas salas">Muitas Salas</option>
                        </select>
                    </div>
                </div>
                <div class="checkbox-group"><input type="checkbox" id="metal"><label>Obstrução Metálica (Palcos/Tendas)</label></div>
                <div class="checkbox-group"><input type="checkbox" id="fixacao" checked><label>Fixação acima de 2.5m disponível</label></div>
                <div class="checkbox-group"><input type="checkbox" id="distancia"><label>Distância do Rack > 100m (Exige Fibra)</label></div>
            </div>
        </div>

        <div id="fluxo_rede_interna" class="modulo">
            <div class="card" style="border-left-color: #eab308;">
                <h3 class="card-title">1. Levantamento de Hardware Existente</h3>
                <div class="form-group">
                    <label>Roteador de Borda:</label>
                    <textarea id="ri_borda" placeholder="Ex: TP-Link Fast WR840N"></textarea>
                </div>
                <div class="form-group">
                    <label>Switches:</label>
                    <textarea id="ri_switches" placeholder="Ex: Switch 10/100 Intelbras"></textarea>
                </div>
                <div class="form-group">
                    <label>Access Points:</label>
                    <textarea id="ri_wifi" placeholder="Ex: Roteadores caseiros como AP"></textarea>
                </div>
            </div>
        </div>

        <div id="secao_critica" class="modulo">
            <div class="card">
                <h3 class="card-title">3. Fatores Críticos</h3>
                <div class="checkbox-group"><input type="checkbox" id="live"><label>Haverá Transmissão ao Vivo / Live</label></div>
                <div class="checkbox-group"><input type="checkbox" id="energia"><label>Energia instável / Uso de Gerador</label></div>
                <div class="checkbox-group"><input type="checkbox" id="hotspot"><label>Necessário Hotspot (Portal de Login)</label></div>
            </div>
            <button onclick="gerarLaudo()">Gerar Laudo Técnico Final</button>
        </div>
    </div>

    <div id="resultado"></div>
</div>

<script>
    function alternarFluxo() {
        const fluxo = document.getElementById('tipo_fluxo').value;
        document.getElementById('secao_identificacao').classList.add('ativo');
        document.getElementById('secao_critica').classList.add('ativo');

        if(fluxo === 'rede_interna') {
            document.getElementById('fluxo_padrao').classList.remove('ativo');
            document.getElementById('fluxo_rede_interna').classList.add('ativo');
        } else {
            document.getElementById('fluxo_rede_interna').classList.remove('ativo');
            document.getElementById('fluxo_padrao').classList.add('ativo');
        }
    }

    function capturarGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                document.getElementById('link_maps').value = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            });
        }
    }

    function gerarLaudo() {
        const fluxo = document.getElementById('tipo_fluxo').value;
        const tecnico = document.getElementById('nome_tecnico').value;
        const cliente = document.getElementById('nome_cliente').value;
        
        let html = `<h2 style="color:var(--cor-acento-tech); text-align:center;">LAUDO TÉCNICO DE VISTORIA</h2>`;
        html += `<p><b>Técnico:</b> ${tecnico} | <b>Cliente:</b> ${cliente}</p><hr>`;

        if(fluxo === 'rede_interna') {
            const borda = document.getElementById('ri_borda').value.toLowerCase();
            const switches = document.getElementById('ri_switches').value.toLowerCase();
            const wifi = document.getElementById('ri_wifi').value.toLowerCase();
            const termosRuins = ["fast", "10/100", "caseiro", "domestico", "antigo", "tp-link"];

            html += `<h3>🔍 ANÁLISE DE HARDWARE ATUAL</h3>`;
            if(termosRuins.some(t => borda.includes(t) || switches.includes(t) || wifi.includes(t))) {
                html += `<div class="alerta-fast"><b>⚠️ GARGALOS DETECTADOS:</b> Equipamentos padrão "Fast" ou domésticos identificados. Recomendamos substituição imediata por padrão Gigabit para suportar o novo projeto.</div>`;
            }
            html += `<p><b>Borda:</b> ${borda}</p><p><b>Switches:</b> ${switches}</p><p><b>Wi-Fi:</b> ${wifi}</p>`;
        } else {
            const total = parseInt(document.getElementById('qtd_user').value) + parseInt(document.getElementById('qtd_staff').value);
            html += `<h3>📊 DIMENSIONAMENTO</h3><p>Total de conexões: ${total} usuários.</p>`;
            if(total > 100) html += `<p><b>Sugestão:</b> Uso obrigatório de Mikrotik RB4011 ou superior.</p>`;
        }

        html += `<button onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>`;
        const resDiv = document.getElementById('resultado');
        resDiv.innerHTML = html;
        resDiv.style.display = 'block';
        resDiv.scrollIntoView();
    }
</script>

</body>
</html>
