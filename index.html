<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistoria Técnica Pro - Daniel Lavor</title>
    <style>
        :root {
            --primary: #0056b3; --bg: #000; --card: #fff; --text: #1a1a1a;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card); border-radius: 12px; padding: 25px; border-top: 10px solid var(--primary); box-shadow: 0 10px 30px rgba(0,86,179,0.3); }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 25px; padding-bottom: 10px; }
        h1 { color: var(--primary); font-size: 22px; text-transform: uppercase; margin: 0; }
        
        .card { background: #f8fafc; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e2e8f0; border-left: 5px solid var(--primary); }
        .card-title { color: var(--primary); font-size: 16px; margin: 0 0 15px 0; font-weight: bold; text-transform: uppercase; }
        
        .form-group { margin-bottom: 15px; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .form-row .form-group { flex: 1; min-width: 200px; }
        
        label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 5px; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        .checkbox-group { display: flex; align-items: flex-start; background: #fff; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; margin-bottom: 8px; cursor: pointer; }
        .checkbox-group input { margin-right: 12px; width: 18px; height: 18px; }

        button { width: 100%; padding: 18px; background: var(--primary); color: #fff; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-gps { background: #444; width: auto; padding: 10px 15px; font-size: 12px; margin: 0; }

        #resultado { display: none; margin-top: 30px; border: 2px solid var(--primary); padding: 25px; border-radius: 8px; }
        .alerta-grosso { background: #fee2e2; border: 2px solid #991b1b; padding: 15px; color: #991b1b; border-radius: 5px; margin-bottom: 20px; font-weight: bold; }
        
        @media print {
            body { background: white; }
            .container { box-shadow: none; border: none; }
            #form-area, button { display: none !important; }
            #resultado { display: block !important; border: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Vistoria Técnica e Laudo de Engenharia</h1>
    </div>

    <div id="form-area">
        <div class="card">
            <h3 class="card-title">0. Identificação e Localização</h3>
            <div class="form-row">
                <div class="form-group"><label>Técnico Responsável:</label><input type="text" id="t_nome" value="Daniel Lavor"></div>
                <div class="form-group"><label>Cliente / Evento:</label><input type="text" id="t_cliente"></div>
            </div>
            <div class="form-group">
                <label>📍 Localização GPS:</label>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="t_gps" placeholder="Link do Google Maps">
                    <button type="button" class="btn-gps" onclick="capturarGPS()">Capturar Agora</button>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Data Vistoria:</label><input type="date" id="t_data_v"></div>
                <div class="form-group"><label>Previsão Execução:</label><input type="date" id="t_data_e"></div>
            </div>
            <div class="form-group"><label>📷 Foto do Local/Planta:</label><input type="file" accept="image/*"></div>
        </div>

        <div class="card">
            <h3 class="card-title">1. Dimensionamento de Dispositivos</h3>
            <div class="form-row">
                <div class="form-group"><label>Público Estimado (Wi-Fi):</label><input type="number" id="q_wifi" value="0"></div>
                <div class="form-group"><label>Staff / Produção:</label><input type="number" id="q_staff" value="0"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Maquininhas (POS):</label><input type="number" id="q_pos" value="0"></div>
                <div class="form-group"><label>Dispositivos Cabeados (PCs/NVR):</label><input type="number" id="q_cabo" value="0"></div>
            </div>
        </div>

        <div class="card">
            <h3 class="card-title">2. Infraestrutura e Barreiras</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Ambiente:</label>
                    <select id="i_ambiente">
                        <option value="interno">Interno (Indoor)</option>
                        <option value="externo">Externo (Outdoor)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Obstruções Físicas:</label>
                    <select id="i_obstrucao">
                        <option value="amplo">Vão Livre</option>
                        <option value="paredes">Múltiplas Salas/Paredes</option>
                    </select>
                </div>
            </div>
            <div class="checkbox-group"><input type="checkbox" id="i_metal"><label>Obstrução Metálica (Palcos/Tendas/Estruturas)</label></div>
            <div class="checkbox-group"><input type="checkbox" id="i_fixacao" checked><label>Pontos de Fixação > 2.5m Disponíveis</label></div>
            <div class="checkbox-group"><input type="checkbox" id="i_distancia"><label>Distância Rack até Pontos > 100m (Exige Fibra)</label></div>
        </div>

        <div class="card" style="border-left-color: #eab308;">
            <h3 class="card-title">3. Levantamento de Rede Interna Atual</h3>
            <div class="form-group">
                <label>Equipamento de Borda Atual (Router/Firewall):</label>
                <textarea id="r_borda" placeholder="Ex: TP-Link WR840N Fast Ethernet"></textarea>
            </div>
            <div class="form-group">
                <label>Switches Atuais:</label>
                <textarea id="r_switch" placeholder="Ex: Switch 8p 10/100 Intelbras"></textarea>
            </div>
            <div class="form-group">
                <label>Access Points Existentes:</label>
                <textarea id="r_wifi" placeholder="Ex: Roteadores caseiros configurados como AP"></textarea>
            </div>
        </div>

        <div class="card">
            <h3 class="card-title">4. Fatores Críticos do Projeto</h3>
            <div class="checkbox-group"><input type="checkbox" id="f_live"><label>Haverá Transmissão ao Vivo (Live)</label></div>
            <div class="checkbox-group"><input type="checkbox" id="f_energia"><label>Energia Instável ou Uso de Gerador</label></div>
            <div class="checkbox-group"><input type="checkbox" id="f_hotspot"><label>Exige Hotspot / Captive Portal</label></div>
            <div class="form-group"><label>Observações Técnicas Adicionais:</label><textarea id="f_obs" style="height: 80px;"></textarea></div>
        </div>

        <button onclick="gerarLaudo()">Processar Laudo de Engenharia</button>
    </div>

    <div id="resultado"></div>
</div>

<script>
    function capturarGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                document.getElementById('t_gps').value = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
            });
        }
    }

    function gerarLaudo() {
        const cliente = document.getElementById('t_cliente').value || "Não informado";
        const tecnico = document.getElementById('t_nome').value;
        const wifi = parseInt(document.getElementById('q_wifi').value) || 0;
        const staff = parseInt(document.getElementById('q_staff').value) || 0;
        const pos = parseInt(document.getElementById('q_pos').value) || 0;
        const cabeados = parseInt(document.getElementById('q_cabo').value) || 0;
        const total_wifi = wifi + staff + pos;

        let materiais = [];
        let alertas = [];

        // LÓGICA DE CÁLCULO ORIGINAL
        if(total_wifi > 0) {
            let cap = document.getElementById('i_ambiente').value === 'externo' ? 100 : 80;
            if(document.getElementById('i_metal').checked) cap = cap * 0.7; // Redução por metal
            
            let qtdAPs = Math.ceil(total_wifi / cap);
            if(document.getElementById('i_obstrucao').value === 'paredes') qtdAPs = Math.max(qtdAPs, 2);
            
            materiais.push(`<b>${qtdAPs}x</b> Access Points Profissionais (Wi-Fi 6 recomendado)`);
            if(qtdAPs > 1) materiais.push(`<b>01x</b> Switch PoE Gigabit (${qtdAPs > 8 ? '16p' : '8p'})`);
            else materiais.push("<b>01x</b> Injetor PoE Gigabit");
        }

        // Roteamento
        if(total_wifi > 400) {
            materiais.push("<b>01x</b> Routerboard Mikrotik RB5009 ou superior");
            alertas.push("PROJETO DE ALTA DENSIDADE: Requer balanceamento de carga e tune de rádio.");
        } else if (total_wifi > 50) {
            materiais.push("<b>01x</b> Routerboard Mikrotik RB4011");
        } else {
            materiais.push("<b>01x</b> Routerboard Mikrotik hEX S (Gigabit)");
        }

        // ANÁLISE DE REDE INTERNA (DETECÇÃO DE FAST)
        const b = document.getElementById('r_borda').value.toLowerCase();
        const s = document.getElementById('r_switch').value.toLowerCase();
        const w = document.getElementById('r_wifi').value.toLowerCase();
        if([b,s,w].some(x => x.includes("fast") || x.includes("10/100") || x.includes("caseiro") || x.includes("antigo"))) {
            alertas.push("GARGALO DETECTADO: Equipamentos Fast Ethernet ou domésticos devem ser removidos e substituídos por Gigabit.");
        }

        // Outras regras originais
        if(document.getElementById('i_distancia').checked) materiais.push("<b>01x</b> Par de Conversores de Mídia + Fibra Drop");
        if(document.getElementById('f_energia').checked) materiais.push("<b>01x</b> Nobreak Senoidal Profissional");
        if(document.getElementById('f_live').checked) alertas.push("LIVE: Reservar porta LAN exclusiva e proibir Wi-Fi para o Encoder.");

        // CONSTRUÇÃO DO HTML FINAL
        let html = `
            <div style="text-align:center;">
                <h2 style="color:var(--primary); margin-bottom:5px;">LAUDO TÉCNICO DE VISTORIA</h2>
                <p><b>Cliente:</b> ${cliente} | <b>Técnico:</b> ${tecnico}</p>
            </div>
            <hr>
        `;

        if(total_wifi > 500) html += `<div class="alerta-grosso">⚠️ ALERTA: PROJETO DE GRANDE PORTE - REQUER SITE SURVEY DETALHADO</div>`;
        if(alertas.length > 0) html += `<h3>🚨 Recomendações e Alertas</h3><ul>${alertas.map(a => `<li style="color:#991b1b"><b>${a}</b></li>`).join('')}</ul>`;

        html += `
            <h3>📦 Lista de Equipamentos Sugerida</h3>
            <ul>${materiais.map(m => `<li>${m}</li>`).join('')}</ul>
            <h3>📝 Inventário Atual (Rede Interna)</h3>
            <p>Borda: ${b || "N/A"} | Switches: ${s || "N/A"} | Wi-Fi: ${w || "N/A"}</p>
            <h3>ℹ️ Observações Adicionais</h3>
            <p>${document.getElementById('f_obs').value || "Nenhuma observação."}</p>
            <button onclick="window.print()" style="background:#333;">🖨️ Imprimir / Salvar PDF</button>
        `;

        const resDiv = document.getElementById('resultado');
        resDiv.innerHTML = html;
        resDiv.style.display = 'block';
        resDiv.scrollIntoView({behavior:'smooth'});
    }
</script>
</body>
</html>
