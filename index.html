<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Laudo Técnico de Vistoria</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* ======== SEU CSS ORIGINAL AJUSTADO ======== */
:root {
    --cor-acento-tech: #0056b3;
    --cor-brilho-tech: rgba(0, 123, 255, 0.5);
    --preto-fundo: #000000;
    --preto-texto: #1A1A1A;
    --branco: #FFFFFF;
    --cinza-borda: #E2E8F0;
    --cinza-fundo-card: #F8FAFC;
}

body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--preto-fundo);
    padding: 20px 10px;
    margin: 0;
    color: var(--preto-texto);
}

.container {
    max-width: 700px;
    background-color: var(--branco);
    margin: 0 auto;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 86, 179, 0.15);
    border-top: 8px solid var(--cor-acento-tech);
}

.header {
    text-align: center;
    margin-bottom: 25px;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--cinza-borda);
}

.logo {
    max-width: 200px;
    height: auto;
}

h1 {
    color: var(--cor-acento-tech);
    font-size: 22px;
    text-transform: uppercase;
    font-weight: 900;
}

.card {
    background: var(--cinza-fundo-card);
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 20px;
    border: 1px solid var(--cinza-borda);
    border-left: 5px solid var(--cor-acento-tech);
}

label {
    display: block;
    font-weight: bold;
    font-size: 13px;
    margin-bottom: 6px;
}

input, select {
    width: 100%;
    padding: 12px;
    border: 1px solid #CBD5E1;
    border-radius: 6px;
    font-size: 14px;
    background: var(--branco);
}

button {
    width: 100%;
    padding: 18px;
    background-color: var(--cor-acento-tech);
    color: var(--branco);
    border: none;
    border-radius: 6px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
}

#resultado {
    display: none;
    padding: 20px;
    margin-top: 20px;
    background: #fff;
    border-left: 10px solid var(--cor-acento-tech);
}

/* ===== MINI CHATGPT (widget flutuante) ===== */
#chatbot-btn {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: #0056b3;
    color: white;
    width: 65px;
    height: 65px;
    border-radius: 50%;
    border: none;
    font-size: 30px;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
}

#chatbot-box {
    position: fixed;
    bottom: 100px;
    right: 25px;
    width: 300px;
    height: 380px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
    display: none;
    flex-direction: column;
    overflow: hidden;
}

#chat-header {
    background: #0056b3;
    color: white;
    padding: 10px;
    font-weight: bold;
}

#chat-messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    font-size: 14px;
}

#chat-input-area {
    display: flex;
    border-top: 1px solid #ddd;
}

#chat-input {
    flex: 1;
    padding: 10px;
    border: none;
}

#chat-send {
    background: #0056b3;
    color: white;
    padding: 10px;
    border: none;
    width: 60px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
<div class="header">
    <h1>Laudo Técnico de Vistoria</h1>
</div>

<div id="formulario_perguntas">

<div class="card">
<h3 class="card-title">Informações Gerais</h3>
<label>Técnico:</label>
<input type="text" id="nome_tecnico">

<label>Cidade:</label>
<input type="text" id="cidade">

<label>Evento:</label>
<input type="text" id="nome_evento">

<label>Link Maps:</label>
<input type="url" id="link_maps">

<label>Data Vistoria:</label>
<input type="date" id="data_vistoria">

<label>Data Evento:</label>
<input type="date" id="data_evento">
</div>

<div class="card">
<h3 class="card-title">Estimativas</h3>
<label>Público:</label>
<input type="number" id="publico">

<label>Staff:</label>
<input type="number" id="staff">

<label>Maquininhas:</label>
<input type="number" id="maquininhas">
</div>

<div class="card">
<h3 class="card-title">Criticidade</h3>
<label>Tipo de Evento:</label>
<select id="tipo_evento">
<option>Baixa</option>
<option>Média</option>
<option>Alta</option>
</select>

<label>Ambiente:</label>
<select id="ambiente">
<option>Aberto</option>
<option>Fechado</option>
</select>

<label>Divisórias:</label>
<select id="divisorias">
<option>Nenhuma</option>
<option>Média</option>
<option>Muitas</option>
</select>
</div>

<div class="card">
<h3 class="card-title">Alertas</h3>
<label><input type="checkbox" id="metal"> Obstrução Metálica</label>
<label><input type="checkbox" id="distancia_100m"> Distância elevada</label>
<label><input type="checkbox" id="tem_live"> Transmissão ao vivo</label>
<label><input type="checkbox" id="sinal_ruim_4g"> Sinal 4G/5G ruim</label>
<label><input type="checkbox" id="energia_oscila"> Energia instável</label>
<label><input type="checkbox" id="tem_hotspot"> Cliente exige Hotspot</label>
</div>

<button onclick="gerarProjeto()">Gerar Laudo</button>
</div>

<div id="resultado"></div>

</div>

<!-- ================== SCRIPT COMPLETO REFEITO ================== -->
<script>
function formatarData(dataISO) {
    if (!dataISO) return "Não informada";
    const partes = dataISO.split("-");
    return `${partes[2]}/${partes[1]}/${partes[0]}`;
}

function gerarProjeto() {
    let nome = nome_tecnico.value;
    let cidade = cidade.value;
    let evento = nome_evento.value;

    let dataVistoria = formatarData(data_vistoria.value);
    let dataEvento = formatarData(data_evento.value);

    let publico = publico.value;
    let staff = staff.value;
    let maquininhas = maquininhas.value;

    let tipoEvento = tipo_evento.value;
    let ambiente = ambiente.value;
    let divisorias = divisorias.value;

    let linkMaps = link_maps.value;

    let metal = metal.checked;
    let distancia = distancia_100m.checked;
    let temLive = tem_live.checked;
    let sinalRuim = sinal_ruim_4g.checked;
    let energiaOscila = energia_oscila.checked;
    let hotspot = tem_hotspot.checked;

    let resultadoHTML = `
        <h2>Resultado da Vistoria</h2>

        <h3>Dados Gerais</h3>
        Técnico: ${nome}<br>
        Cidade: ${cidade}<br>
        Evento: ${evento}<br>
        Localização: <a href="${linkMaps}" target="_blank">${linkMaps}</a><br>
        Data da Vistoria: ${dataVistoria}<br>
        Data do Evento: ${dataEvento}<br><br>

        <h3>Estimativa de Carga</h3>
        Público: ${publico}<br>
        Staff: ${staff}<br>
        Maquininhas: ${maquininhas}<br><br>

        <h3>Criticidade</h3>
        Tipo de Evento: ${tipoEvento}<br>
        Ambiente: ${ambiente}<br>
        Divisórias: ${divisorias}<br><br>

        <h3>Alertas</h3>
        ${metal ? "• Obstrução metálica<br>" : ""}
        ${distancia ? "• Distância elevada<br>" : ""}
        ${temLive ? "• Evento possui transmissão crítica<br>" : ""}
        ${sinalRuim ? "• Sinal 4G/5G ruim<br>" : ""}
        ${energiaOscila ? "• Energia instável<br>" : ""}
        ${hotspot ? "• Hotspot obrigatório<br>" : ""}
    `;

    resultado.innerHTML = resultadoHTML;
    resultado.style.display = "block";
    formulario_perguntas.style.display = "none";
}

/* ================= MINI CHATBOT ================= */
function enviarMensagem() {
    const msg = chat_input.value.trim();
    if (!msg) return;

    chat_messages.innerHTML += `<div><b>Você:</b> ${msg}</div>`;

    let resposta = "Entendi! Pode me dizer mais.";

    if (msg.includes("oi")) resposta = "Olá! Como posso ajudar?";
    if (msg.includes("evento")) resposta = "Parece importante! Quer ajuda com vistoria?";
    if (msg.includes("internet")) resposta = "Problemas de sinal são comuns. Qual o ambiente?";
    if (msg.includes("maquina")) resposta = "Ok! Vou considerar maquininhas no cálculo.";

    setTimeout(() => {
        chat_messages.innerHTML += `<div><b>Chat:</b> ${resposta}</div>`;
        chat_messages.scrollTop = chat_messages.scrollHeight;
    }, 500);

    chat_input.value = "";
}

document.addEventListener("keypress", function(e){
    if (e.key === "Enter") enviarMensagem();
});
</script>

<!-- ============= MINI CHATGPT FLUTUANTE ============= -->
<button id="chatbot-btn" onclick="chatbotBox.style.display = chatbotBox.style.display==='flex'?'none':'flex'">💬</button>

<div id="chatbot-box" style="display:none; flex-direction:column;">
    <div id="chat-header">Suporte DanielTec</div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
        <input id="chat-input" placeholder="Digite...">
        <button id="chat-send" onclick="enviarMensagem()">➤</button>
    </div>
</div>

</body>
</html>
