<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vistoria Técnica Pro - Daniel Tec</title>

<style>
:root {
    --cor-acento-tech: #0056b3;
    --cor-brilho-tech: rgba(0, 123, 255, 0.3);
    --preto-fundo: #000;
    --branco: #fff;
    --cinza-borda: #E2E8F0;
    --cinza-fundo-card: #F8FAFC;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--preto-fundo);
    padding: 20px;
}

.container {
    max-width: 850px;
    background: var(--branco);
    margin: auto;
    padding: 25px;
    border-radius: 12px;
    border-top: 8px solid var(--cor-acento-tech);
}

.card {
    background: var(--cinza-fundo-card);
    padding: 20px;
    margin-bottom: 20px;
    border-left: 5px solid var(--cor-acento-tech);
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #CBD5E1;
    border-radius: 6px;
}

input:focus, select:focus, textarea:focus {
    border-color: var(--cor-acento-tech);
    box-shadow: 0 0 0 2px var(--cor-brilho-tech);
}

button {
    width: 100%;
    padding: 15px;
    background: var(--cor-acento-tech);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.checkbox-group {
    margin: 8px 0;
}

.modulo { display:none; }
.modulo.ativo { display:block; }

#resultado {
    display:none;
    margin-top:20px;
    border:2px solid var(--cor-acento-tech);
    padding:20px;
}
</style>
</head>

<body>

<div class="container">

<select id="tipo_fluxo" onchange="alternarFluxo()">
<option value="">Selecione</option>
<option value="evento">Evento</option>
<option value="corporativo">Corporativo</option>
<option value="rede_interna">Rede Interna</option>
</select>

<div id="secao_comum" class="modulo">
<input id="nome_tecnico" placeholder="Técnico">
<input id="nome_cliente" placeholder="Cliente">
<input id="link_maps" placeholder="GPS">
<button onclick="capturarGPS()">GPS</button>

<select id="ambiente">
<option value="interno">Interno</option>
<option value="externo">Externo</option>
</select>

<select id="divisorias">
<option value="amplo">Aberto</option>
<option value="salas">Salas</option>
</select>

<div class="checkbox-group"><input type="checkbox" id="metal"> Metal</div>
<div class="checkbox-group"><input type="checkbox" id="distancia"> Distância</div>
</div>

<div id="fluxo_carga" class="modulo">
<input type="number" id="qtd_user" placeholder="Usuários">
<input type="number" id="qtd_staff" placeholder="Staff">
<input type="number" id="qtd_pos" placeholder="POS">
<input type="number" id="qtd_cabo" placeholder="Cabos">
</div>

<div id="fluxo_rede_interna" class="modulo">
<textarea id="ri_borda" placeholder="Borda"></textarea>
<textarea id="ri_switches" placeholder="Switches"></textarea>
<textarea id="ri_wifi" placeholder="WiFi"></textarea>
</div>

<div id="secao_final" class="modulo">
<div class="checkbox-group"><input type="checkbox" id="live"> Live</div>
<div class="checkbox-group"><input type="checkbox" id="energia"> Energia</div>
<textarea id="obs_projeto"></textarea>

<button onclick="gerarLaudo()">Gerar Laudo</button>
</div>

<div id="resultado"></div>

</div>

<script>

const $ = id => document.getElementById(id);

function alternarFluxo(){
    document.querySelectorAll('.modulo').forEach(m=>m.classList.remove('ativo'));

    $('secao_comum').classList.add('ativo');
    $('secao_final').classList.add('ativo');

    if($('tipo_fluxo').value === 'rede_interna'){
        $('fluxo_rede_interna').classList.add('ativo');
    } else {
        $('fluxo_carga').classList.add('ativo');
    }
}

function capturarGPS(){
    if(!navigator.geolocation){
        alert("GPS não suportado");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        p=>{
            $('link_maps').value =
            `https://maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`;
        },
        ()=>alert("Erro ao capturar GPS")
    );
}

function addAlerta(lista,msg,nivel="medio"){
    const cores={
        alto:"#991b1b",
        medio:"#b45309",
        baixo:"#1d4ed8"
    };

    lista.push(`<li style="color:${cores[nivel]}">⚠️ ${msg}</li>`);
}

function gerarLaudo(){

    const res = $('resultado');
    res.innerHTML = "🔄 Processando...";
    res.style.display="block";

    setTimeout(processarLaudo,300);
}

function processarLaudo(){

    const fluxo = $('tipo_fluxo').value;

    if(!fluxo){
        alert("Selecione o tipo");
        return;
    }

    const tecnico = $('nome_tecnico').value || "Não informado";
    const cliente = $('nome_cliente').value || "Não informado";

    const user = +$('qtd_user').value || 0;
    const staff = +$('qtd_staff').value || 0;
    const pos = +$('qtd_pos').value || 0;
    const cabos = +$('qtd_cabo').value || 0;

    const totalWifi = user+staff+pos;

    let eq=[];
    let alertas=[];

    const ambiente = $('ambiente').value;
    const metal = $('metal').checked;
    const divisorias = $('divisorias').value;

    const capacidadeBase={
        interno:80,
        externo:100
    };

    let cap = capacidadeBase[ambiente];

    if(metal) cap*=0.75;
    if(divisorias==="salas") cap*=0.85;

    if(totalWifi>0){
        let aps = Math.ceil(totalWifi/cap);

        eq.push(`${aps}x AP Wi-Fi 6`);
        eq.push(aps>1 ? "Switch PoE" : "Injetor PoE");

        if(aps>=4){
            eq.push("Controladora Wi-Fi");
        }
    }

    if(totalWifi>50 || fluxo==="rede_interna"){
        eq.push("Roteador profissional");
    } else {
        eq.push("Roteador padrão");
    }

    if($('distancia').checked){
        eq.push("Fibra óptica");
    }

    if($('energia').checked){
        eq.push("Nobreak");
    }

    if(totalWifi>400){
        addAlerta(alertas,"Alta densidade","alto");
    }

    if($('live').checked){
        addAlerta(alertas,"Live usar cabo","alto");
    }

    let html=`
    <h2>LAUDO</h2>
    <p><b>Cliente:</b> ${cliente}</p>
    <p><b>Técnico:</b> ${tecnico}</p>

    <h3>Equipamentos</h3>
    <ul>${eq.map(i=>`<li>${i}</li>`).join('')}</ul>

    <h3>Alertas</h3>
    <ul>${alertas.join('')}</ul>

    <button onclick="window.print()">Imprimir</button>
    `;

    $('resultado').innerHTML=html;
}

</script>

</body>
</html>
