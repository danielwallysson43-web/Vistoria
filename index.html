<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE ENGENHARIA DE REDES - DANIEL LAVOR</title>
    <style>
        :root {
            --primary: #0056b3; --warning: #eab308; --danger: #991b1b;
            --bg: #000; --card-bg: #fff; --text: #1a1a1a;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--card-bg); border-radius: 8px; overflow: hidden; border-top: 10px solid var(--primary); box-shadow: 0 0 40px rgba(0,86,179,0.3); }
        .p-4 { padding: 25px; }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 30px; }
        .header h1 { margin: 5px 0; font-size: 24px; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        
        .section-title { background: #f1f5f9; padding: 10px 15px; border-left: 5px solid var(--primary); font-weight: 900; text-transform: uppercase; margin: 25px 0 15px 0; display: flex; justify-content: space-between; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 800; margin-bottom: 5px; color: #444; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 5px; font-size: 14px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(0,86,179,0.3); }
        
        .check-item { display: flex; align-items: center; background: #fafafa; padding: 12px; border: 1px solid #e2e8f0; border-radius: 5px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; }
        .check-item:hover { background: #f1f5f9; }
        .check-item input { width: 20px; height: 20px; margin-right: 15px; cursor: pointer; }

        button { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 5px; font-size: 18px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 20px; transition: 0.3s; }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }

        #laudo-final { display: none; margin-top: 40px; padding: 30px; border: 3px solid var(--primary); border-radius: 10px; background: #fff; }
        .alerta-grosso { background: #fee2e2; border: 2px solid #991b1b; padding: 15px; color: #991b1b; border-radius: 5px; margin-bottom: 20px; font-weight: bold; }
        .item-lista { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #ccc; font-size: 15px; }
        .item-lista b { color: var(--primary); }

        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; }
            #form-input, .header h1, button { display: none !important; }
            #laudo-final { display: block !important; border: none; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="p-4">
        <div class="header">
            <h1>Protocolo de Engenharia de Infraestrutura</h1>
            <p style="font-size: 12px; font-weight: bold;">Engenheiro Responsável: Daniel Lavor</p>
        </div>

        <div id="form-input">
            <div class="section-title">0. Identificação do Projeto</div>
            <div class="grid">
                <div class="form-group"><label>Cliente / Razão Social</label><input type="text" id="cliente" placeholder="Ex: Shopping da Praça"></div>
                <div class="form-group"><label>Protocolo de Vistoria</label><input type="text" id="protocolo" value="2026-REV-001"></div>
                <div class="form-group"><label>Localização (GPS/Link)</label><input type="text" id="gps" placeholder="Link Google Maps"></div>
                <div class="form-group"><label>Data da Execução Prevista</label><input type="date" id="data_exec"></div>
            </div>

            <div class="section-title">1. Levantamento de Hardware e Ativos (Retrofit) <span>Análise Crítica</span></div>
            <div class="grid">
                <div class="form-group">
                    <label>Borda / Firewall Atual</label>
                    <textarea id="h_borda" placeholder="Descreva marca/modelo. Ex: TP-Link WR840N (Fast)"></textarea>
                </div>
                <div class="form-group">
                    <label>Switches de Distribuição</label>
                    <textarea id="h_switch" placeholder="Ex: 2x Switch 8p Intelbras 10/100"></textarea>
                </div>
                <div class="form-group">
                    <label>Access Points Wi-Fi</label>
                    <textarea id="h_wifi" placeholder="Ex: Roteadores D-Link antigos"></textarea>
                </div>
            </div>

            <div class="section-title">2. Dimensionamento de Tráfego e Usuários</div>
            <div class="grid">
                <div class="form-group"><label>Usuários Wi-Fi (Simultâneos)</label><input type="number" id="c_wifi" value="0"></div>
                <div class="form-group"><label>Dispositivos Cabeados (PCs/NVR)</label><input type="number" id="c_cabo" value="0"></div>
                <div class="form-group"><label>Maquininhas POS / Pagamento</label><input type="number" id="c_pos" value="0"></div>
                <div class="form-group"><label>Câmeras IP / CFTV</label><input type="number" id="c_cftv" value="0"></div>
            </div>

            <div class="section-title">3. Barreiras e Condições de Instalação</div>
            <div class="grid">
                <div class="check-item"><input type="checkbox" id="i_metal"><label>Obstrução Severa (Metal / Vidro / Laje)</label></div>
                <div class="check-item"><input type="checkbox" id="i_distancia"><label>Distância entre pontos > 100m (Fibra Opcional)</label></div>
                <div class="check-item"><input type="checkbox" id="i_energia"><label>Rede Elétrica Instável / Sem Aterramento</label></div>
                <div class="check-item"><input type="checkbox" id="i_fixacao" checked><label>Ponto de Fixação > 2.5m de altura</label></div>
            </div>

            <div class="section-title">4. Configurações e Software Sugeridos</div>
            <div class="grid">
                <div class="check-item"><input type="checkbox" id="s_live"><label>Haverá Transmissão ao Vivo (Live)</label></div>
                <div class="check-item"><input type="checkbox" id="s_hotspot"><label>Exige Captive Portal (Hotspot / Voucher)</label></div>
                <div class="check-item"><input type="checkbox" id="s_vpn"><label>Exige VPN Site-to-Site ou Client-to-Site</label></div>
                <div class="check-item"><input type="checkbox" id="s_vlan"><label>Segmentação por VLAN (Admin/User/POS)</label></div>
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label>Observações Adicionais do Consultor</label>
                <textarea id="obs" style="height: 100px;" placeholder="Detalhe interferências, marcas preferenciais ou riscos específicos..."></textarea>
            </div>

            <button onclick="gerarLaudoMestre()">Processar Diagnóstico de Engenharia</button>
        </div>

        <div id="laudo-final"></div>
    </div>
</div>

<script>
    function gerarLaudoMestre() {
        // Coleta de dados
        const cliente = document.getElementById('cliente').value || "CLIENTE NÃO INFORMADO";
        const c_wifi = parseInt(document.getElementById('c_wifi').value) || 0;
        const c_cabo = parseInt(document.getElementById('c_cabo').value) || 0;
        const c_pos = parseInt(document.getElementById('c_pos').value) || 0;
        const c_cftv = parseInt(document.getElementById('c_cftv').value) || 0;
        const total_dispositivos = c_wifi + c_cabo + c_pos + c_cftv;
        
        const h_borda = document.getElementById('h_borda').value.toLowerCase();
        const h_switch = document.getElementById('h_switch').value.toLowerCase();
        const h_wifi = document.getElementById('h_wifi').value.toLowerCase();

        let itensMaterial = [];
        let alertasCriticos = [];

        // --- MOTOR DE DECISÃO DE HARDWARE ---
        
        // Análise de Gargalos (Retrofit)
        const gargalos = ["fast", "10/100", "caseiro", "domestico", "antigo", "tp-link", "wr840", "841n"];
        if(gargalos.some(g => h_borda.includes(g) || h_switch.includes(g) || h_wifi.includes(g))) {
            alertasCriticos.push("REMOÇÃO OBRIGATÓRIA: Equipamentos Fast Ethernet/10-100 detectados no inventário.");
        }

        // Borda (Router)
        if(total_dispositivos > 500) {
            itensMaterial.push("<b>01x</b> Routerboard Mikrotik RB5009UG ou CCR2004");
            alertasCriticos.push("PROJETO DE ALTA DENSIDADE: Exige roteador com processamento multicore.");
        } else if (total_dispositivos > 100 || document.getElementById('s_vpn').checked) {
            itensMaterial.push("<b>01x</b> Routerboard Mikrotik RB4011 ou RB1100AHx4");
        } else {
            itensMaterial.push("<b>01x</b> Mikrotik hEX S ou RB750Gr3 (Gigabit)");
        }

        // Wi-Fi (Access Points)
        if(c_wifi > 0) {
            let densidade = document.getElementById('i_metal').checked ? 60 : 100;
            let qtdAPs = Math.ceil(c_wifi / densidade);
            if(total_dispositivos > 400) qtdAPs += 1; // Margem de segurança para eventos
            
            itensMaterial.push(`<b>${qtdAPs}x</b> Access Points Wi-Fi 6 Profissionais (Sugerido: Ubiquiti U6-Pro ou Mikrotik cAP ax)`);
        }

        // Switching
        const totalPontosFisicos = c_cftv + c_cabo + (itensMaterial.some(i => i.includes("Access Point")) ? parseInt(itensMaterial[1]) : 0);
        if(totalPontosFisicos > 20) {
            itensMaterial.push("<b>01x</b> Switch Gerenciável L2/L3 24 Portas Gigabit PoE+ (Padrão 802.3at)");
        } else if (totalPontosFisicos > 0) {
            itensMaterial.push("<b>01x</b> Switch Gerenciável 8 Portas Gigabit PoE+");
        }

        // Periféricos de Engenharia
        if(document.getElementById('i_distancia').checked) {
            itensMaterial.push("<b>01x</b> Par de Conversores de Mídia Giga + Bobina Fibra Drop 1F");
        }
        if(document.getElementById('i_energia').checked || total_dispositivos > 200) {
            itensMaterial.push("<b>01x</b> Nobreak Senoidal Profissional 1500VA+ com expansão de bateria");
        }
        if(c_cftv > 10) {
            alertasCriticos.push("SEGURANÇA ELETRÔNICA: Recomendado criar VLAN isolada para o tráfego de câmeras.");
        }
        if(document.getElementById('s_live').checked) {
            alertasCriticos.push("LIVE AO VIVO: Reservar banda mínima (QoS) e proibir uso de Wi-Fi para o Encoder.");
        }

        // --- RENDERIZAÇÃO DO LAUDO ---
        let laudoHTML = `
            <div style="text-align:center;">
                <h1 style="color:var(--primary); margin:0;">LAUDO TÉCNICO DE ENGENHARIA</h1>
                <p><b>PROJETO:</b> ${cliente.toUpperCase()} | <b>DATA:</b> ${new Date().toLocaleDateString()}</p>
            </div>
            <hr>
        `;

        if(alertasCriticos.length > 0) {
            laudoHTML += `<div class="alerta-grosso">📋 ALERTAS TÉCNICOS PRIORITÁRIOS:<ul>`;
            alertasCriticos.forEach(a => laudoHTML += `<li>${a}</li>`);
            laudoHTML += `</ul></div>`;
        }

        laudoHTML += `
            <div class="section-title">A. Diagnóstico de Carga</div>
            <div class="item-lista">Total Dispositivos: <b>${total_dispositivos} un.</b></div>
            <div class="item-lista">Carga Wireless: <b>${c_wifi} dispositivos</b></div>
            <div class="item-lista">Infraestrutura Cabeada: <b>${c_cabo + c_cftv} pontos</b></div>

            <div class="section-title">B. Lista de Materiais Sugerida (BOQ)</div>
            <ul>${itensMaterial.map(i => `<li class="item-lista">${i}</li>`).join('')}</ul>

            <div class="section-title">C. Levantamento de Ativos Atuais</div>
            <p style="font-size:14px; background:#f9f9f9; padding:10px;">${document.getElementById('h_borda').value || "Não informado"} / ${document.getElementById('h_switch').value || ""} / ${document.getElementById('h_wifi').value || ""}</p>

            <div class="section-title">D. Considerações de Execução</div>
            <p style="font-size:14px;">${document.getElementById('obs').value || "Nenhuma observação adicional registrada."}</p>
            
            <div style="margin-top:50px; display:flex; justify-content:space-between;">
                <div style="border-top:1px solid #000; width:250px; text-align:center; padding-top:5px; font-size:12px;"><b>Assinatura Engenharia</b></div>
                <div style="border-top:1px solid #000; width:250px; text-align:center; padding-top:5px; font-size:12px;"><b>Aceite Cliente</b></div>
            </div>
            
            <button class="btn-imprimir" onclick="window.print()" style="margin-top:30px; background:#333;">🖨️ Imprimir Laudo Oficial</button>
        `;

        const laudoDiv = document.getElementById('laudo-final');
        laudoDiv.innerHTML = laudoHTML;
        laudoDiv.style.display = 'block';
        laudoDiv.scrollIntoView({behavior: 'smooth'});
    }
</script>

</body>
</html>
